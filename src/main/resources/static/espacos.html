<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Espaços - ReservaEspaços Maputo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <div class="brand-icon sm"><i class="fa-solid fa-building-columns"></i></div>
      <div><span class="brand-name">ReservaEspaços</span><span class="brand-sub">Maputo</span></div>
    </div>
    <button class="sidebar-close" onclick="closeSidebar()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section"><span class="nav-label">Principal</span>
      <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i><span>Dashboard</span></a>
    </div>
    <div class="nav-section"><span class="nav-label">Gestão</span>
      <a href="clientes.html" class="nav-item"><i class="fa-solid fa-users"></i><span>Clientes</span></a>
      <a href="proprietarios.html" class="nav-item"><i class="fa-solid fa-user-tie"></i><span>Proprietários</span></a>
      <a href="espacos.html" class="nav-item active"><i class="fa-solid fa-building"></i><span>Espaços</span></a>
    </div>
    <div class="nav-section"><span class="nav-label">Operações</span>
      <a href="reservas.html" class="nav-item"><i class="fa-solid fa-calendar-check"></i><span>Reservas</span></a>
      <a href="pagamentos.html" class="nav-item"><i class="fa-solid fa-credit-card"></i><span>Pagamentos</span></a>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="avatar" id="sidebar-avatar">?</div>
      <div><div class="user-name" id="sidebar-name">-</div><div class="user-role" id="sidebar-role">-</div></div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i></button>
  </div>
</aside>

<div class="main-wrapper">
  <header class="topbar">
    <button class="hamburger" onclick="openSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="topbar-title"><h2>Espaços</h2><p id="topbar-date"></p></div>
    <div class="topbar-actions">
      <div class="badge-role" id="topbar-role"></div>
    </div>
  </header>
  <main class="page-content">
    <div class="page-toolbar">
      <div class="toolbar-left">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="search" placeholder="Pesquisar espaços…" oninput="filterData()"/>
        </div>
        <select id="filter-tipo" onchange="filterData()" class="filter-select">
          <option value="">Todos os tipos</option>
          <option value="Casamento">Casamento</option>
          <option value="Conferencia">Conferência</option>
          <option value="Festa">Festa</option>
          <option value="Reuniao">Reunião</option>
        </select>
        <select id="filter-disp" onchange="filterData()" class="filter-select">
          <option value="">Disponibilidade</option>
          <option value="true">Disponível</option>
          <option value="false">Indisponível</option>
        </select>
      </div>
      <button id="btn-novo-espaco" class="btn-primary" onclick="openModal()">
        <i class="fa-solid fa-plus"></i> Novo Espaço
      </button>
    </div>

    <!-- Cards grid -->
    <div class="espacos-grid" id="espacos-grid">
      <div class="loading-full"><i class="fa-solid fa-spinner fa-spin"></i> A carregar…</div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal" onclick="closeOnBackdrop(event)">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="modal-title">Novo Espaço</h3>
      <button onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div id="modal-alert" class="alert hidden"></div>
      <input type="hidden" id="edit-id"/>
      <!-- Campo de proprietário oculto — preenchido automaticamente pelo sistema -->
      <input type="hidden" id="f-proprietarioId"/>
      <!-- Linha do nome (ocupa linha inteira quando PROPRIETARIO, partilhada com select quando ADMIN) -->
      <div class="form-row" id="row-nome-prop">
        <div class="form-group flex-2"><label>Nome do Espaço *</label><input type="text" id="f-nomeEspaco"/></div>
        <!-- ADMIN vê este select; PROPRIETARIO não vê -->
        <div class="form-group" id="group-prop-select" style="display:none">
          <label>Proprietário *</label>
          <select id="f-proprietarioSelect"></select>
        </div>
      </div>
      <div class="form-group"><label>Descrição</label><textarea id="f-descricao" rows="3"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Bairro *</label><input type="text" id="f-bairro"/></div>
        <div class="form-group"><label>Tipo de Evento *</label>
          <select id="f-tipoEvento">
            <option>Casamento</option><option>Conferencia</option>
            <option>Festa</option><option>Reuniao</option><option>Outro</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Capacidade *</label><input type="number" id="f-capacidade" min="1"/></div>
        <div class="form-group"><label>Preço/hora (MZN) *</label><input type="number" id="f-precoReserva" min="0" step="0.01"/></div>
        <div class="form-group"><label>Disponível</label>
          <select id="f-disponibilidade"><option value="true">Sim</option><option value="false">Não</option></select>
        </div>
      </div>
      <div class="form-group">
        <label>Fotos do Espaço <span id="foto-label-hint" style="font-weight:400;color:var(--text-muted)">(mín. 1, máx. 7 — ao criar)</span></label>
        <input type="file" id="f-fotos" accept="image/*" multiple style="padding:6px 0"/>
        <div id="foto-preview" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px"></div>
        <small id="foto-count-msg" style="color:var(--text-muted)">Seleccione entre 1 e 7 imagens (JPG, PNG, WEBP, máx. 10 MB cada)</small>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" id="btn-save" onclick="save()">
        <i class="fa-solid fa-floppy-disk"></i> Guardar
      </button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
checkAuth(); initUI();
let data = [], proprietarios = [];

// ── Carregar dados iniciais ───────────────────────────────────────────────
async function load() {
  const grid = document.getElementById('espacos-grid');
  grid.innerHTML = '<div class="loading-full"><i class="fa-solid fa-spinner fa-spin"></i> A carregar…</div>';
  try {
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const role = (user.role || '').toUpperCase();

    // Sempre carregar os espaços primeiro — independente de qualquer outro erro
    data = await API.get('/espaco');

    if (role === 'ADMIN') {
      // ADMIN: carregar lista de proprietários para o select do modal
      try {
        proprietarios = await API.get('/proprietario');
        document.getElementById('group-prop-select').style.display = '';
        const sel = document.getElementById('f-proprietarioSelect');
        sel.innerHTML = '<option value="">- Selecione um Proprietário -</option>' +
          proprietarios.map(p => `<option value="${p.id}">${p.nome} ${p.apelido}</option>`).join('');
      } catch(_) { /* Se falhar, o select fica vazio mas os espaços aparecem */ }

    } else if (role === 'PROPRIETARIO') {
      // PROPRIETARIO: resolver o próprio perfil — erro aqui NÃO bloqueia a lista
      let propId = user.proprietarioId;
      if (!propId) {
        try {
          const prop = await API.get('/proprietario/me');
          propId = prop.id;
          user.proprietarioId = propId;
          localStorage.setItem('user', JSON.stringify(user));
          proprietarios = [prop];
        } catch(_) {
          // Perfil de proprietário ainda não criado — espaços aparecem na mesma
          proprietarios = [];
        }
      } else {
        try { proprietarios = [await API.get('/proprietario/' + propId)]; } catch(_) {}
      }

    } else {
      // CLIENTE — só leitura, esconder botão "Novo Espaço"
      document.getElementById('btn-novo-espaco').style.display = 'none';
    }

    render(data);
  } catch(e) {
    grid.innerHTML = `<p class="error-msg">Erro ao carregar espaços: ${e.message}</p>`;
  }
}

// ── Renderização dos cards ────────────────────────────────────────────────
function render(rows) {
  const grid = document.getElementById('espacos-grid');
  if (!rows || !rows.length) {
    grid.innerHTML = '<p class="empty-full">Sem espaços encontrados</p>';
    return;
  }
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  const role = (user.role || '').toUpperCase();
  const myPropId = user.proprietarioId ? String(user.proprietarioId) : null;

  grid.innerHTML = rows.map(e => {
    // CORRIGIDO: mostrar foto real se existir; ícone apenas como fallback
    const primeiraFoto = e.fotos && e.fotos.length > 0 ? e.fotos[0]
                       : e.foto ? e.foto
                       : null;
    const imgHtml = primeiraFoto
      ? `<img src="/uploads/${primeiraFoto}" alt="${e.nomeEspaco}"
              style="width:100%;height:100%;object-fit:cover;border-radius:8px 8px 0 0;"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
         /><div class="espaco-icon" style="display:none"><i class="fa-solid fa-building"></i></div>`
      : `<div class="espaco-icon"><i class="fa-solid fa-building"></i></div>`;

    // CORRIGIDO: PROPRIETARIO vê Editar/Apagar apenas nos seus próprios espaços
    const ePropId = e.proprietario ? String(e.proprietario.id) : null;
    const podeEditar = role === 'ADMIN' || (role === 'PROPRIETARIO' && ePropId && ePropId === myPropId);

    return `
    <div class="espaco-card ${e.disponibilidade ? '' : 'unavail'}">
      <div class="espaco-card-header" style="position:relative;min-height:120px;overflow:hidden;">
        ${imgHtml}
        <div class="espaco-badges" style="position:absolute;top:8px;right:8px;">
          <span class="badge tipo">${e.tipoEvento}</span>
          <span class="badge ${e.disponibilidade ? 'disp' : 'indisp'}">${e.disponibilidade ? 'Disponível' : 'Indisponível'}</span>
        </div>
      </div>
      <h4>${e.nomeEspaco}</h4>
      <p class="espaco-bairro"><i class="fa-solid fa-location-dot"></i> ${e.bairro}</p>
      <p class="espaco-desc">${e.descricao || 'Sem descrição'}</p>
      <div class="espaco-meta">
        <span><i class="fa-solid fa-users"></i> ${e.capacidade} pax</span>
        <span><i class="fa-solid fa-tag"></i> ${formatMZN(e.precoReserva)}/h</span>
      </div>
      <div class="espaco-owner">
        <i class="fa-solid fa-user-tie"></i>
        ${e.proprietario ? e.proprietario.nome + ' ' + e.proprietario.apelido : 'N/A'}
      </div>
      ${podeEditar ? `
      <div class="card-actions">
        <button class="btn-icon edit" onclick="openModal(${e.id})"><i class="fa-solid fa-pen-to-square"></i> Editar</button>
        <button class="btn-icon del" onclick="del(${e.id},'${e.nomeEspaco}')"><i class="fa-solid fa-trash"></i></button>
      </div>` : ''}
    </div>`;
  }).join('');
}

// ── Filtros locais ────────────────────────────────────────────────────────
function filterData() {
  const q    = document.getElementById('search').value.toLowerCase();
  const tipo = document.getElementById('filter-tipo').value;
  const disp = document.getElementById('filter-disp').value;
  render(data.filter(e =>
    (!q    || `${e.nomeEspaco} ${e.bairro} ${e.tipoEvento}`.toLowerCase().includes(q)) &&
    (!tipo || e.tipoEvento === tipo) &&
    (disp === '' || String(e.disponibilidade) === disp)
  ));
}

// ── Preview de fotos seleccionadas ────────────────────────────────────────
document.getElementById('f-fotos').addEventListener('change', function() {
  const files = Array.from(this.files);
  const prev  = document.getElementById('foto-preview');
  const msg   = document.getElementById('foto-count-msg');
  prev.innerHTML = '';

  if (files.length > 7) {
    msg.style.color = 'var(--danger)';
    msg.textContent = `Máximo 7 fotos — seleccionou ${files.length}. Remova algumas.`;
    return;
  }

  files.forEach(f => {
    const url = URL.createObjectURL(f);
    const img = document.createElement('img');
    img.src = url;
    img.style.cssText = 'width:72px;height:72px;object-fit:cover;border-radius:8px;border:2px solid var(--border)';
    prev.appendChild(img);
  });

  const isNew = !document.getElementById('edit-id').value;
  if (isNew && files.length < 1) {
    msg.style.color = 'var(--danger)';
    msg.textContent = `Seleccione pelo menos 1 foto.`;
  } else {
    msg.style.color = 'var(--text-muted)';
    msg.textContent = `${files.length} foto(s) seleccionada(s).`;
  }
});

// ── Abrir modal ───────────────────────────────────────────────────────────
async function openModal(id) {
  // Limpar estado anterior
  clearForm(['f-nomeEspaco','f-descricao','f-bairro','f-capacidade','f-precoReserva']);
  document.getElementById('edit-id').value = '';
  document.getElementById('f-proprietarioId').value = '';
  document.getElementById('f-fotos').value = '';
  document.getElementById('foto-preview').innerHTML = '';
  document.getElementById('foto-count-msg').textContent = 'Seleccione entre 1 e 7 imagens (JPG, PNG, WEBP, máx. 10 MB cada)';
  document.getElementById('foto-count-msg').style.color = 'var(--text-muted)';
  document.getElementById('modal-title').textContent = id ? 'Editar Espaço' : 'Novo Espaço';
  document.getElementById('foto-label-hint').textContent = id ? '(opcional ao editar)' : '(mín. 1, máx. 7 — ao criar)';
  hideModalAlert();

  const user = JSON.parse(localStorage.getItem('user') || '{}');
  const role = (user.role || '').toUpperCase();

  // ── Resolver proprietarioId para PROPRIETARIO ─────────────────────────
  if (role === 'PROPRIETARIO') {
    let propId = user.proprietarioId || (proprietarios.length > 0 ? proprietarios[0].id : null);

    if (!propId) {
      // Último recurso: buscar /proprietario/me
      try {
        const prop = await API.get('/proprietario/me');
        propId = prop.id;
        user.proprietarioId = propId;
        localStorage.setItem('user', JSON.stringify(user));
        proprietarios = [prop];
      } catch(_) {
        showModalAlert('Perfil de proprietário não encontrado. Complete o registo em "Proprietários" antes de adicionar espaços.');
        document.getElementById('modal').classList.add('show');
        return;
      }
    }
    document.getElementById('f-proprietarioId').value = propId;
  }

  // ── Modo edição: preencher campos ─────────────────────────────────────
  if (id) {
    const e = data.find(x => x.id === id);
    if (!e) return;
    document.getElementById('edit-id').value       = e.id;
    document.getElementById('f-nomeEspaco').value  = e.nomeEspaco;
    document.getElementById('f-descricao').value   = e.descricao || '';
    document.getElementById('f-bairro').value      = e.bairro;
    document.getElementById('f-tipoEvento').value  = e.tipoEvento;
    document.getElementById('f-capacidade').value  = e.capacidade;
    document.getElementById('f-precoReserva').value = e.precoReserva;
    document.getElementById('f-disponibilidade').value = String(e.disponibilidade);

    if (role === 'ADMIN' && e.proprietario) {
      document.getElementById('f-proprietarioSelect').value = e.proprietario.id;
      document.getElementById('f-proprietarioId').value = e.proprietario.id;
    } else if (e.proprietario) {
      document.getElementById('f-proprietarioId').value = e.proprietario.id;
    }
  }

  document.getElementById('modal').classList.add('show');
}

// ── Guardar espaço ────────────────────────────────────────────────────────
async function save() {
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  hideModalAlert();

  const id   = document.getElementById('edit-id').value;
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  const role = (user.role || '').toUpperCase();

  // Resolver proprietarioId
  let propId = document.getElementById('f-proprietarioId').value;
  if (role === 'ADMIN') {
    propId = document.getElementById('f-proprietarioSelect').value;
    document.getElementById('f-proprietarioId').value = propId;
  } else if (role === 'PROPRIETARIO' && !propId) {
    if (proprietarios.length > 0) {
      propId = String(proprietarios[0].id);
    } else {
      try {
        const prop = await API.get('/proprietario/me');
        propId = String(prop.id);
        user.proprietarioId = prop.id;
        localStorage.setItem('user', JSON.stringify(user));
        proprietarios = [prop];
      } catch(_) {}
    }
    document.getElementById('f-proprietarioId').value = propId;
  }

  if (!propId) {
    showModalAlert(role === 'ADMIN'
      ? 'Seleccione um Proprietário.'
      : 'Perfil de proprietário não encontrado. Complete o registo em "Proprietários" antes de adicionar espaços.');
    btn.disabled = false;
    return;
  }

  // Validar fotos
  const fotosInput = document.getElementById('f-fotos');
  const fotos = Array.from(fotosInput.files || []);
  if (!id && fotos.length < 1) {
    showModalAlert('Adicione pelo menos 1 foto do espaço.');
    btn.disabled = false;
    return;
  }
  if (fotos.length > 7) {
    showModalAlert('Máximo permitido é 7 fotos.');
    btn.disabled = false;
    return;
  }

  const body = {
    proprietarioId : parseInt(propId),
    nomeEspaco     : document.getElementById('f-nomeEspaco').value.trim(),
    descricao      : document.getElementById('f-descricao').value.trim(),
    bairro         : document.getElementById('f-bairro').value.trim(),
    tipoEvento     : document.getElementById('f-tipoEvento').value,
    capacidade     : parseInt(document.getElementById('f-capacidade').value),
    precoReserva   : parseFloat(document.getElementById('f-precoReserva').value),
    disponibilidade: document.getElementById('f-disponibilidade').value === 'true'
  };

  if (!body.nomeEspaco || !body.bairro || isNaN(body.capacidade) || isNaN(body.precoReserva)) {
    showModalAlert('Preencha todos os campos obrigatórios.');
    btn.disabled = false;
    return;
  }

  try {
    let savedEspaco;
    if (id) {
      savedEspaco = await API.put(`/espaco/${id}`, body);
    } else {
      savedEspaco = await API.post('/espaco', body);
    }
    const espacoId = savedEspaco?.id || id;

    // Upload das fotos uma a uma — acumulativo (backend já não sobrescreve)
    if (fotos.length > 0 && espacoId) {
      let fotosFailed = 0;
      for (const foto of fotos) {
        const fd = new FormData();
        fd.append('arquivo', foto);
        try { await API.upload(`/espaco/${espacoId}/foto`, fd); }
        catch(_) { fotosFailed++; }
      }
      if (fotosFailed > 0) {
        showModalAlert(`Espaço guardado, mas ${fotosFailed} foto(s) não foram enviadas. Pode tentar novamente ao editar.`);
        load();
        return;  // btn.disabled reactivado no finally
      }
    }

    closeModal();
    load();
  } catch(e) {
    showModalAlert(e.message);
  } finally {
    // CORRIGIDO: btn sempre reactivado — mesmo se save() lançar excepção inesperada
    btn.disabled = false;
  }
}

// ── Eliminar espaço ───────────────────────────────────────────────────────
async function del(id, nome) {
  if (!confirm(`Eliminar o espaço "${nome}"?`)) return;
  try { await API.del('/espaco/' + id); load(); }
  catch(e) { alert('Erro: ' + e.message); }
}

load();
</script>
</body>
</html>
