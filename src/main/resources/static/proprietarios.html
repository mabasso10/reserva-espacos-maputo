<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Proprietários — ReservaEspaços Maputo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <div class="brand-icon sm"><i class="fa-solid fa-building-columns"></i></div>
      <div><span class="brand-name">ReservaEspaços</span><span class="brand-sub">Maputo</span></div>
    </div>
    <button class="sidebar-close" onclick="closeSidebar()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section"><span class="nav-label">Principal</span>
      <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i><span>Dashboard</span></a>
    </div>
    <div class="nav-section"><span class="nav-label">Gestão</span>
      <a href="clientes.html" class="nav-item"><i class="fa-solid fa-users"></i><span>Clientes</span></a>
      <a href="proprietarios.html" class="nav-item active"><i class="fa-solid fa-user-tie"></i><span>Proprietários</span></a>
      <a href="espacos.html" class="nav-item"><i class="fa-solid fa-building"></i><span>Espaços</span></a>
    </div>
    <div class="nav-section"><span class="nav-label">Operações</span>
      <a href="reservas.html" class="nav-item"><i class="fa-solid fa-calendar-check"></i><span>Reservas</span></a>
      <a href="pagamentos.html" class="nav-item"><i class="fa-solid fa-credit-card"></i><span>Pagamentos</span></a>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="avatar" id="sidebar-avatar">?</div>
      <div><div class="user-name" id="sidebar-name">—</div><div class="user-role" id="sidebar-role">—</div></div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i></button>
  </div>
</aside>

<div class="main-wrapper">
  <header class="topbar">
    <button class="hamburger" onclick="openSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="topbar-title"><h2>Proprietários</h2><p id="topbar-date"></p></div>
    <div class="topbar-actions"><div class="badge-role" id="topbar-role"></div></div>
  </header>
  <main class="page-content">
    <div class="page-toolbar">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="search" placeholder="Pesquisar proprietários…" oninput="filterTable()"/>
      </div>
      <button class="btn-primary" onclick="openModal()">
        <i class="fa-solid fa-plus"></i> Novo Proprietário
      </button>
    </div>
    <div class="card">
      <div class="table-responsive">
        <table class="data-table">
          <thead>
            <tr><th>ID</th><th>Nome</th><th>Telefone</th><th>Bairro</th><th>NUIT</th><th class="col-actions">Acções</th></tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" class="loading-cell"><i class="fa-solid fa-spinner fa-spin"></i> A carregar…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-backdrop" id="modal" onclick="closeOnBackdrop(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Novo Proprietário</h3>
      <button onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div id="modal-alert" class="alert hidden"></div>
      <input type="hidden" id="edit-id"/>
      <div class="form-row">
        <div class="form-group"><label>Nome *</label><input type="text" id="f-nome"/></div>
        <div class="form-group"><label>Apelido *</label><input type="text" id="f-apelido"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Telefone *</label><input type="text" id="f-telefone" placeholder="+258 84 000 0000"/></div>
        <div class="form-group"><label>Bairro *</label><input type="text" id="f-bairro"/></div>
      </div>
      <div class="form-group"><label>NUIT *</label><input type="text" id="f-nuit" placeholder="400000000"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" id="btn-save" onclick="save()"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
checkAuth(); initUI();
let data = [];

async function load() {
  try {
    data = await API.get('/proprietario');
    render(data);
  } catch(e) { showTableError('tbody', 6, e.message); }
}

function render(rows) {
  const tbody = document.getElementById('tbody');
  if (!rows.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">Sem registos</td></tr>'; return; }
  tbody.innerHTML = rows.map(p => `
    <tr>
      <td><span class="mono">#${p.id}</span></td>
      <td><strong>${p.nome} ${p.apelido}</strong></td>
      <td>${p.telefone}</td>
      <td><span class="tag">${p.bairro}</span></td>
      <td><span class="mono">${p.nuit}</span></td>
      <td class="col-actions">
        <button class="btn-icon edit" onclick="openModal(${p.id})"><i class="fa-solid fa-pen-to-square"></i></button>
        <button class="btn-icon del" onclick="del(${p.id},'${p.nome} ${p.apelido}')"><i class="fa-solid fa-trash"></i></button>
      </td>
    </tr>`).join('');
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  render(data.filter(p => `${p.nome} ${p.apelido} ${p.bairro} ${p.nuit}`.toLowerCase().includes(q)));
}

function openModal(id) {
  clearForm(['f-nome','f-apelido','f-telefone','f-bairro','f-nuit']);
  document.getElementById('edit-id').value = '';
  document.getElementById('modal-title').textContent = 'Novo Proprietário';
  if (id) {
    const p = data.find(x => x.id === id);
    if (!p) return;
    document.getElementById('edit-id').value = p.id;
    document.getElementById('modal-title').textContent = 'Editar Proprietário';
    document.getElementById('f-nome').value = p.nome;
    document.getElementById('f-apelido').value = p.apelido;
    document.getElementById('f-telefone').value = p.telefone;
    document.getElementById('f-bairro').value = p.bairro;
    document.getElementById('f-nuit').value = p.nuit;
  }
  document.getElementById('modal').classList.add('show');
}

async function save() {
  const btn = document.getElementById('btn-save');
  btn.disabled = true; hideModalAlert();
  const id = document.getElementById('edit-id').value;
  const body = {
    nome: document.getElementById('f-nome').value,
    apelido: document.getElementById('f-apelido').value,
    telefone: document.getElementById('f-telefone').value,
    bairro: document.getElementById('f-bairro').value,
    nuit: document.getElementById('f-nuit').value
  };
  try {
    if (id) await API.put('/proprietario/'+id, body);
    else await API.post('/proprietario', body);
    closeModal(); load();
  } catch(e) { showModalAlert(e.message); btn.disabled = false; }
}

async function del(id, nome) {
  if (!confirm(`Eliminar o proprietário "${nome}"?`)) return;
  try { await API.del('/proprietario/'+id); load(); }
  catch(e) { alert('Erro: ' + e.message); }
}

load();
</script>
</body>
</html>
