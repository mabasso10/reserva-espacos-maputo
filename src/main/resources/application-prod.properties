# ============================================================
#  ReservaEspacosMaputo - application-prod.properties (MySQL)
#  Para activar: java -jar app.jar --spring.profiles.active=prod
#  Ou definir a variável de ambiente: SPRING_PROFILES_ACTIVE=prod
# ============================================================

# ----- MySQL -----
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/reserva_espacos_maputo?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Console H2 desactivada em prod
spring.h2.console.enabled=false
