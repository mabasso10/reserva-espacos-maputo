# ============================================================
#  ReservaEspacosMaputo - application.properties  (DEV - H2)
# ============================================================

spring.application.name=ReservaEspacosMaputo

# ----- H2 (desenvolvimento) -----
spring.datasource.url=jdbc:h2:mem:reservas_maputo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ----- JSON -----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# ----- JWT -----
app.jwt.secret=Rm9yVGVzdGluZ1B1cnBvc2VzT25seVNlY3JldEtleVRoYXRJc0xvbmdFbm91Z2g=
app.jwt.expiration-ms=86400000

# ----- Upload de ficheiros -----
# CORRIGIDO: alinhado com o frontend (que informava 10 MB por foto)
# Anteriormente 5 MB causava erro 413 opaco para uploads entre 5-10 MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=80MB
app.uploads.dir=./uploads

# ----- Swagger / OpenAPI -----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ----- Erros -----
server.error.include-message=always
server.error.include-binding-errors=always

# ----- Logging -----
logging.level.org.springframework.security=INFO
logging.level.com.reservaespacos=DEBUG
